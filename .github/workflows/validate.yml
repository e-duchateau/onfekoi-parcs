name: Validation du JSON
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer jq
        run: sudo apt-get install -y jq
      - name: JSON syntaxiquement valide
        run: |
          jq empty parcs.json || (echo "❌ Erreur de syntaxe détectée !" && jq -c 'path(..)' parcs.json 2>&1)
      - name: Aucune description ne dépasse 80 caractères
        run: |
          count=$(jq '[.[] | select(.short_description | length > 80)] | length' parcs.json)
          if [ "$count" -ne 0 ]; then
            echo "❌ $count description(s) trop longue(s)"
            exit 1
          fi
          echo "✅ Toutes les descriptions sont OK"
      - name: Installer Python via mise
        uses: jdx/mise-action@v2
      - name: Installer check-jsonschema
        run: pip install check-jsonschema
      - name: Le JSON respecte le contrat (schema.json)
        run: python -m check_jsonschema --schemafile schema.json parcs.json