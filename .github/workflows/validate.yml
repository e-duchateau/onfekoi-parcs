name: Validation du JSON
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer jq
        run: sudo apt-get install -y jq
      - name: JSON syntaxiquement valide
        run: |
          jq empty parcs.json || (echo "❌ Erreur de syntaxe détectée !" && jq -c 'path(..)' parcs.json 2>&1)
      - name: Aucune description ne dépasse 80 caractères
        run: |
          count=$(jq '[.[] | select(.short_description | length > 80)] | length' parcs.json)
          if [ "$count" -ne 0 ]; then
            echo "❌ $count description(s) trop longue(s)"
            exit 1
          fi
          echo "✅ Toutes les descriptions sont OK"
      - name: Installer Python via mise
        uses: jdx/mise-action@v2
      - name: Installer check-jsonschema
        run: pip install check-jsonschema
      - name: Le JSON respecte le contrat (schema.json)
        run: python -m check_jsonschema --schemafile schema.json parcs.json
      -  name: Calculer les métriques de qualité
         run: |
          total=$(jq 'length' parcs.json)
          avec_coords=$(jq '[.[] | select(.latitude != null and .longitude != null)] | length' parcs.json)
          avec_desc=$(jq '[.[] | select(.short_description != null and .short_description != "")] | length' parcs.json)
          verifies=$(jq '[.[] | select(.verified == true)] | length' parcs.json)

          echo "## Tableau de bord qualité 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrique | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total parcs | $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Avec coordonnées GPS | $avec_coords / $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Avec description | $avec_desc / $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Vérifiés manuellement | $verifies / $total |" >> $GITHUB_STEP_SUMMARY
